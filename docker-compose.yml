services:
  script:
    build:
      context: .
      tags:
        - bitcoinfuzz:script
      args:
        CXXFLAGS: "-DBITCOIN_CORE -DRUST_BITCOIN"
        FUZZ: script
    env_file: .env
    environment:
      MODULES: ${MODULES:-}
    volumes:
      - ./docker:/app/data

  deserialize_block:
    build:
      context: .
      tags:
        - bitcoinfuzz:deserialize_block
      args:
        CXXFLAGS: "-DBITCOIN_CORE -DRUST_BITCOIN -DBTCD"
        FUZZ: deserialize_block
    env_file: .env
    environment:
      MODULES: ${MODULES:-}
    volumes:
      - ./docker:/app/data

  # Note: gocoin module not included here due to cgo symbol conflicts with btcd
  # (both are Go modules that embed the Go runtime, causing linker errors)
  script_eval:
    build:
      context: .
      tags:
        - bitcoinfuzz:script_eval
      args:
        CXXFLAGS: "-DBITCOIN_CORE -DBTCD"
        FUZZ: script_eval
    env_file: .env
    environment:
      MODULES: ${MODULES:-}
    volumes:
      - ./docker:/app/data

  verify_script:
    build:
      context: .
      tags:
        - bitcoinfuzz:verify_script
      args:
        CXXFLAGS: "-DBITCOIN_CORE -DBTCD"
        FUZZ: verify_script
    env_file: .env
    environment:
      MODULES: ${MODULES:-}
    volumes:
      - ./docker:/app/data

  descriptor_parse:
    build:
      context: .
      tags:
        - bitcoinfuzz:descriptor_parse
      args:
        CXXFLAGS: "-DBITCOIN_CORE -DNBITCOIN -DRUST_MINISCRIPT -DEMBIT"
        FUZZ: descriptor_parse
    env_file: .env
    environment:
      MODULES: ${MODULES:-}
      LIBFUZZ_DETECT_LEAKS: 0
      ASAN_OPTIONS: detect_leaks=0
    volumes:
      - ./docker:/app/data

  kernel_block:
    build:
      context: .
      tags:
        - bitcoinfuzz:kernel_block
      args:
        CXXFLAGS: "-DPYBITCOINKERNEL -DRUSTBITCOINKERNEL"
        FUZZ: kernel_block
    env_file: .env
    environment:
      MODULES: ${MODULES:-}
      LIBFUZZ_DETECT_LEAKS: 0
      ASAN_OPTIONS: detect_leaks=0
    volumes:
      - ./docker:/app/data

  kernel_transaction:
    build:
      context: .
      tags:
        - bitcoinfuzz:kernel_transaction
      args:
        CXXFLAGS: "-DPYBITCOINKERNEL -DRUSTBITCOINKERNEL"
        FUZZ: kernel_transaction
    env_file: .env
    environment:
      LIBFUZZ_DETECT_LEAKS: 0
      ASAN_OPTIONS: detect_leaks=0
    volumes:
      - ./docker:/app/data

  miniscript_parse:
    build:
      context: .
      tags:
        - bitcoinfuzz:miniscript_parse
      args:
        CXXFLAGS: "-DBITCOIN_CORE -DNBITCOIN -DRUST_MINISCRIPT -DEMBIT"
        FUZZ: miniscript_parse
    env_file: .env
    environment:
      MODULES: ${MODULES:-}
      LIBFUZZ_DETECT_LEAKS: 0
      ASAN_OPTIONS: detect_leaks=0
    volumes:
      - ./docker:/app/data

  deserialize_invoice:
    build:
      context: .
      tags:
        - bitcoinfuzz:deserialize_invoice
      args:
        CXXFLAGS: "-DLDK -DLND -DNLIGHTNING -DCLIGHTNING -DECLAIR -DLIGHTNING_KMP -DCUSTOM_MUTATOR_BOLT11"
        FUZZ: deserialize_invoice
    env_file: .env
    environment:
      MODULES: ${MODULES:-}
      LIBFUZZ_DETECT_LEAKS: 0
      ASAN_OPTIONS: detect_leaks=0
    volumes:
      - ./docker:/app/data

  address_parse:
