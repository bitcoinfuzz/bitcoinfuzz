# Alertmanager configuration for bitcoinfuzz monitoring.
#
# Routes alerts to:
# 1. Orchestrator webhook (always, for database recording)
# 2. Email (optional, configure smtp settings)

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'target']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 4h
  receiver: 'orchestrator-webhook'

  routes:
    # Critical alerts: shorter repeat interval
    - match:
        severity: critical
      receiver: 'orchestrator-webhook'
      repeat_interval: 30m

receivers:
  # Primary receiver: sends alerts to the orchestrator's webhook endpoint
  # The orchestrator records them in SQLite and logs them
  - name: 'orchestrator-webhook'
    webhook_configs:
      - url: 'http://orchestrator:8000/api/alerts/webhook'
        send_resolved: true
        http_config:
          # Add bearer token if API auth is enabled
          # bearer_token: '<token>'

  # Optional email receiver (uncomment and configure to enable)
  # - name: 'email-alerts'
  #   email_configs:
  #     - to: 'team@example.com'
  #       from: 'bitcoinfuzz-alerts@example.com'
  #       smarthost: 'smtp.example.com:587'
  #       auth_username: 'alerts@example.com'
  #       auth_password: '<password>'
  #       require_tls: true

# Inhibition rules: suppress lower-severity alerts when critical ones fire
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['target', 'campaign_id']
