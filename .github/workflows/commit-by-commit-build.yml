name: Commit-by-Commit Build

on:
  push:
    paths-ignore:
      - '**/*.md'
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '**/*.md'

jobs:
  get-commits:
    runs-on: ubuntu-latest
    outputs:
      commits: ${{ steps.get-commits.outputs.commits }}
      should_run: ${{ steps.get-commits.outputs.should_run }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commits in PR
        id: get-commits
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Get the base branch
            base_ref="${{ github.base_ref }}"
            git fetch origin "$base_ref"

            # Get all commits in the PR
            git fetch origin pull/${{ github.event.number }}/head:pr-${{ github.event.number }}
            commits=$(git rev-list --reverse "origin/$base_ref..pr-${{ github.event.number }}")
          else
            # push event (e.g. on a fork): diff against the default branch
            base_ref="${{ github.event.repository.default_branch }}"
            git fetch origin "$base_ref"
            commits=$(git rev-list --reverse "origin/$base_ref..${{ github.sha }}")
          fi

          # Count commits
          commit_count=$(echo "$commits" | wc -l)
          echo "Found $commit_count commits in PR"

          # Skip if only one commit
          if [ "$commit_count" -eq 1 ]; then
            echo "⏭️  Skipping commit-by-commit build: PR contains only 1 commit"
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "commits=[]" >> $GITHUB_OUTPUT
          else
            echo "✅ Running commit-by-commit build for $commit_count commits"
            # Convert to JSON array for matrix
            commits_json=$(echo "$commits" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "commits=$commits_json" >> $GITHUB_OUTPUT
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

  build-commit:
    needs: get-commits
    if: needs.get-commits.outputs.should_run == 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        commit: ${{ fromJson(needs.get-commits.outputs.commits) }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Checkout specific commit
        run: |
          # Ensure we have the full history including the base branch
          git fetch origin ${{ github.base_ref || github.event.repository.default_branch }}
          git checkout ${{ matrix.commit }}
          git submodule update --recursive

      - name: Get commit info
        id: commit-info
        run: |
          echo "short-sha=$(git rev-parse --short ${{ matrix.commit }})" >> $GITHUB_OUTPUT
          echo "subject=$(git log -1 --pretty=format:'%s' ${{ matrix.commit }})" >> $GITHUB_OUTPUT

      - name: Checkout corpora repo
        uses: actions/checkout@v4
        with:
          repository: bitcoinfuzz/corpora
          path: corpora

      - name: Install rust-toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Install go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip

      - name: Install Boost 1.86 (required for libbitcoin-system targets)
        shell: bash
        run: |
          # Cache hit short-circuits this; Boost is installed to /opt/boost-1.86
          # so the bitcoinfuzz link step can resolve libbitcoin-system's Boost refs.
          if [ ! -f /opt/boost-1.86/lib/cmake/Boost-1.86.0/BoostConfig.cmake ]; then
            python3 -m pip install --upgrade --break-system-packages 'cmake>=3.30'
            curl -sSL -o /tmp/boost.tar.gz \
              https://github.com/boostorg/boost/releases/download/boost-1.86.0/boost-1.86.0-cmake.tar.gz
            tar -xzf /tmp/boost.tar.gz -C /tmp
            cd /tmp/boost-1.86.0
            cmake -B build \
              -DCMAKE_C_COMPILER=/usr/bin/clang \
              -DCMAKE_CXX_COMPILER=/usr/bin/clang++ \
              -DCMAKE_INSTALL_PREFIX=/opt/boost-1.86 \
              -DBUILD_SHARED_LIBS=OFF \
              -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
              -DBOOST_INCLUDE_LIBRARIES="iostreams;locale;program_options;thread;url;test;regex;filesystem;system;date_time;chrono;atomic;random;container;charconv"
            cmake --build build --parallel "$(nproc)"
            sudo cmake --install build
          fi
          echo "BOOST_ROOT=/opt/boost-1.86" >> $GITHUB_ENV

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y lowdown libsodium-dev libboost-all-dev npm nodejs quickjs libquickjs

      - name: Setup common environment
        run: |
          export CC=/usr/bin/clang
          export CXX=/usr/bin/clang++
          echo "CC=/usr/bin/clang" >> $GITHUB_ENV
          echo "CXX=/usr/bin/clang++" >> $GITHUB_ENV

      - name: Build all modules
        timeout-minutes: 60
        run: |
          echo "Building commit ${{ steps.commit-info.outputs.short-sha }}: ${{ steps.commit-info.outputs.subject }}"
          if [ -f "scripts/build-all.sh" ]; then
            bash scripts/build-all.sh
          else
            echo "No build script found at this commit — skipping module builds"
          fi
          echo "✅ Successfully built commit ${{ steps.commit-info.outputs.short-sha }}: ${{ steps.commit-info.outputs.subject }}"
