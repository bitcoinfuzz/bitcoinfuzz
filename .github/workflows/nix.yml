name: Nix Flake

on: [push, pull_request]

jobs:
  flake-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('modules/**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            .cargo/registry
            .cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('flake.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: nix flake check
        run: nix flake check --show-trace

      - name: nix develop
        run: nix develop --command bash -c "echo devshell OK"

      - name: auto_build.sh
        run: nix develop --command bash -lc 'CXXFLAGS="-DLDK -DLND" ./auto_build.sh'
